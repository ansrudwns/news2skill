name: AI Daily Zero-Click Pipeline

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AGENT_PRIVATE_SIGNATURE_KEY: ${{ secrets.AGENT_PRIVATE_SIGNATURE_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Global AI Trends
        run: |
          python scripts/fetch_ai_trends.py
          


      - name: Zero-Click Sync
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          touch pending_queue.json
          touch seen_urls.txt
          git add pending_queue.json seen_urls.txt .agents/
          git diff --quiet && git diff --staged --quiet || (git commit -m "[auto] Cloud Daily Sync" && git push)
