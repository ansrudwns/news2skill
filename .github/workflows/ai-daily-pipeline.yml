name: AI Daily Zero-Click Pipeline

on:
  schedule:
    # UTC 22:00 = 한국 시간(KST) 아침 07:00
    - cron: '0 22 * * *'
  workflow_dispatch:
    # GitHub 사이트에서 수동 버튼으로도 돌릴 수 있게 허용

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # 봇이 새로운 지식을 커밋하고 푸시할 수 있도록 권한 부여
    permissions:
      contents: write
      
    # Node.js 20 Deprecation 경고 해결을 위한 v24 강제 할당
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 1. 저장소 가져오기
        uses: actions/checkout@v4

      - name: 2. 파이썬 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 글로벌 AI 트렌드 크롤링 및 백로그 갱신
        run: |
          python scripts/fetch_ai_trends.py
          # (추후 에이전트 CLI 로직이 있다면 이 밑에 추가)

      - name: 5. 무인 저장 및 커밋 (Zero-Click Sync)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # 새롭게 크롤링된 뉴스나 에이전트 폴더의 변화를 전부 스테이징
          git add daily_raw.json seen_urls.txt .agents/
          
          # 변경사항이 있을 때만 커밋하여 에러 방지
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [auto] Daily AI Trends and Agent Asset Sync" && git push)
