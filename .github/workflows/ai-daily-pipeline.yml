name: AI Daily Zero-Click Pipeline

on:
  schedule:
    # 留ㅼ씪 ?꾩묠 7???섏쭛 諛쒕룞
    - cron: '0 22 * * *'
  workflow_dispatch:
    # GitHub ?ъ씠?몄뿉???섎룞 踰꾪듉?쇰줈???뚮┫ ???덇쾶 ?덉슜

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # 遊뉗씠 ?덈줈??吏?앹쓣 而ㅻ컠?섍퀬 ?몄떆?????덈룄濡?沅뚰븳 遺??
    permissions:
      contents: write
      
    # Node.js 20 Deprecation 寃쎄퀬 ?닿껐???꾪븳 v24 媛뺤젣 ?좊떦
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 1. ??μ냼 媛?몄삤湲?
        uses: actions/checkout@v4

      - name: 2. ?뚯씠???섍꼍 ?명똿
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. ?⑦궎吏 ?ㅼ튂
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 湲濡쒕쾶 AI ?몃젋???щ·留?諛?諛깅줈洹?媛깆떊
        run: |
          python scripts/fetch_ai_trends.py
          # (異뷀썑 ?먯씠?꾪듃 CLI 濡쒖쭅???덈떎硫???諛묒뿉 異붽?)

      - name: 5. 臾댁씤 ???諛?而ㅻ컠 (Zero-Click Sync)
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # ?뚯씪?ㅼ씠 ?놁쓣 寃쎌슦 git add?먯꽌 ?먮윭(128)媛 ?섏? ?딅룄濡?鍮??뚯씪?대씪???앹꽦 蹂댁옣
          touch pending_queue.json
          touch seen_urls.txt
          
          # ?덈∼寃??щ·留곷맂 ?댁뒪???먯씠?꾪듃 ?대뜑??蹂?붾? ?꾨? ?ㅽ뀒?댁쭠
          git add pending_queue.json seen_urls.txt .agents/
          
          # 蹂寃쎌궗??씠 ?덉쓣 ?뚮쭔 而ㅻ컠?섏뿬 ?먮윭 諛⑹?
          git diff --quiet && git diff --staged --quiet || (git commit -m "?쨼 [auto] Daily AI Trends and Agent Asset Sync" && git push)

